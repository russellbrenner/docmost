name: Sync upstream

on:
  schedule:
    - cron: '0 3 * * *'  # 3am UTC daily (1pm AEST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Gitea Actions"
          git config user.email "actions@itsa.house"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/docmost/docmost.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          AHEAD=$(git rev-list --count HEAD..upstream/main)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new upstream commits"
          else
            echo "$AHEAD new upstream commits to merge"
          fi

      - name: Merge upstream
        if: steps.check.outputs.ahead != '0'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push if merge succeeded
        if: steps.merge.outputs.result == 'success'
        run: git push origin main

      - name: Create issue on conflict
        if: steps.merge.outputs.result == 'conflict'
        run: |
          COMMITS=$(git log --oneline HEAD..upstream/main)
          curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues" \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${{ secrets.REPO_TOKEN }}" \
            -d "$(printf '{"title":"Upstream sync: merge conflict","body":"Automatic merge of upstream/main failed due to conflicts.\n\nUpstream commits:\n```\n%s\n```\n\nManual resolution required.","labels":[]}' "$COMMITS")"
